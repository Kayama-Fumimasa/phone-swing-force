<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>この一振り</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f6f6f4;
      color: #111;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "ヒラギノ角ゴ ProN W3", "Yu Gothic", sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    .screen {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: min(86vw, 520px);
      min-height: 180px;
      box-sizing: border-box;
      padding: 34px 36px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.42);
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .main {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: clamp(18px, 5vw, 23px);
      font-weight: 400;
      letter-spacing: 0.035em;
      line-height: 1.5;
      text-align: left;
      white-space: nowrap;
    }

    .main:active {
      opacity: 0.45;
    }

    .value {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="screen">
    <section class="card">
      <button id="startButton" class="main">計測を開始</button>
      <div id="mainText" class="main hidden">スマートフォンを振ってください</div>
    </section>
  </main>

  <script>
    const startButton = document.getElementById("startButton");
    const mainText = document.getElementById("mainText");

    // 端末重量の仮設定。後で機種別の重量表に変更できます。
    const phoneMassKg = 0.20;

    // 振り判定
    const startThreshold = 5.0;
    const endThreshold = 1.2;

    let isMeasuring = false;
    let peakAcceleration = 0;
    let quietStartTime = null;
    let lastResultTime = 0;

    function getDynamicAcceleration(event) {
      const a = event.acceleration;

      if (a && a.x !== null && a.y !== null && a.z !== null) {
        const x = a.x || 0;
        const y = a.y || 0;
        const z = a.z || 0;
        return Math.sqrt(x * x + y * y + z * z);
      }

      const g = event.accelerationIncludingGravity;

      if (g && g.x !== null && g.y !== null && g.z !== null) {
        const x = g.x || 0;
        const y = g.y || 0;
        const z = g.z || 0;
        const magnitude = Math.sqrt(x * x + y * y + z * z);
        return Math.abs(magnitude - 9.80665);
      }

      return 0;
    }

    function showWaiting() {
      mainText.textContent = "スマートフォンを振ってください";
    }

    function showResult(forceN) {
      mainText.innerHTML = `この一振りは、<span class="value">${forceN.toFixed(2)}N</span>`;
    }

    function handleMotion(event) {
      const now = performance.now();
      const dynamicA = getDynamicAcceleration(event);

      if (!isMeasuring) {
        if (now - lastResultTime < 700) return;

        if (dynamicA > startThreshold) {
          isMeasuring = true;
          peakAcceleration = dynamicA;
          quietStartTime = null;
        }

        return;
      }

      peakAcceleration = Math.max(peakAcceleration, dynamicA);

      if (dynamicA < endThreshold) {
        if (quietStartTime === null) {
          quietStartTime = now;
        }

        if (now - quietStartTime > 350) {
          isMeasuring = false;
          lastResultTime = now;

          const forceN = phoneMassKg * peakAcceleration;
          showResult(forceN);
        }
      } else {
        quietStartTime = null;
      }
    }

    async function startMeasurement() {
      try {
        if (
          typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function"
        ) {
          const permission = await DeviceMotionEvent.requestPermission();

          if (permission !== "granted") {
            startButton.textContent = "許可が必要です";
            return;
          }
        }

        startButton.classList.add("hidden");
        mainText.classList.remove("hidden");
        showWaiting();

        window.addEventListener("devicemotion", handleMotion);

      } catch (error) {
        startButton.textContent = "計測できません";
      }
    }

    startButton.addEventListener("click", startMeasurement);
  </script>
</body>
</html>
