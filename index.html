<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>この一振り</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #f5f5f5;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "ヒラギノ角ゴ ProN W3", "Yu Gothic", sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    .screen {
      width: 100%;
      height: 100%;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      text-align: center;
    }

    .main {
      margin: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: clamp(15px, 4vw, 21px);
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1.5;
      text-align: center;
      white-space: normal;
    }

    .button {
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: clamp(15px, 4vw, 21px);
      font-weight: 600;
      letter-spacing: 0.05em;
      line-height: 1.7;
      text-align: center;
      white-space: nowrap;

      border: 1px solid rgba(245, 245, 245, 0.8);
      border-radius: 0;
      padding: 0.5em 1em;
      margin: 0;
      box-sizing: border-box;
    }

    .button:active {
      opacity: 0.5;
    }

    .value {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>
  <main class="screen">
    <button id="startButton" class="button">計測を開始</button>
    <div id="mainText" class="main hidden">スマホを振ってください</div>
  </main>

  <script>
    const startButton = document.getElementById("startButton");
    const mainText = document.getElementById("mainText");

    // 初期値。端末推定に失敗した場合は 200g として計算します。
    let phoneMassKg = 0.20;
    let deviceEstimate = {
      name: "標準端末",
      massKg: 0.20,
      confidence: "default"
    };

    const startThreshold = 5.0;
    const endThreshold = 1.2;

    let isMeasuring = false;
    let peakAcceleration = 0;
    let quietStartTime = null;
    let lastResultTime = 0;

    function getScreenProfile() {
      const width = Math.min(window.screen.width, window.screen.height);
      const height = Math.max(window.screen.width, window.screen.height);
      const dpr = Math.round((window.devicePixelRatio || 1) * 10) / 10;

      return { width, height, dpr };
    }

    function getManualMassFromUrl() {
      const params = new URLSearchParams(window.location.search);

      const kg = Number(params.get("kg") || params.get("massKg"));
      if (!Number.isNaN(kg) && kg >= 0.08 && kg <= 1.00) {
        return {
          name: "手動入力",
          massKg: kg,
          confidence: "manual"
        };
      }

      const gram = Number(params.get("g") || params.get("gram"));
      if (!Number.isNaN(gram) && gram >= 80 && gram <= 1000) {
        return {
          name: "手動入力",
          massKg: gram / 1000,
          confidence: "manual"
        };
      }

      return null;
    }

    async function getAndroidModelName() {
      if (
        navigator.userAgentData &&
        typeof navigator.userAgentData.getHighEntropyValues === "function"
      ) {
        try {
          const values = await navigator.userAgentData.getHighEntropyValues([
            "platform",
            "model"
          ]);

          if (values && values.model) {
            return values.model;
          }
        } catch (error) {
          return "";
        }
      }

      return "";
    }

    function estimateIPhoneMass() {
      const { width, height, dpr } = getScreenProfile();

      // iPhone は Safari 上で正確な機種名を取得しにくいため、
      // CSS 画面サイズと devicePixelRatio から「近い重量帯」を推定します。
      const iPhoneRules = [
        {
          width: 320,
          height: 568,
          dpr: 2,
          name: "iPhone SE / 5系",
          massKg: 0.120
        },
        {
          width: 375,
          height: 667,
          dpr: 2,
          name: "iPhone SE / 6 / 7 / 8系",
          massKg: 0.145
        },
        {
          width: 414,
          height: 736,
          dpr: 3,
          name: "iPhone Plus系",
          massKg: 0.190
        },
        {
          width: 375,
          height: 812,
          dpr: 3,
          name: "iPhone X / XS / 11 Pro系",
          massKg: 0.180
        },
        {
          width: 360,
          height: 780,
          dpr: 3,
          name: "iPhone mini系",
          massKg: 0.140
        },
        {
          width: 390,
          height: 844,
          dpr: 3,
          name: "iPhone 標準サイズ系",
          massKg: 0.175
        },
        {
          width: 393,
          height: 852,
          dpr: 3,
          name: "iPhone Pro系",
          massKg: 0.190
        },
        {
          width: 414,
          height: 896,
          dpr: 2,
          name: "iPhone XR / 11系",
          massKg: 0.195
        },
        {
          width: 414,
          height: 896,
          dpr: 3,
          name: "iPhone Max系",
          massKg: 0.220
        },
        {
          width: 428,
          height: 926,
          dpr: 3,
          name: "iPhone Plus / Pro Max系",
          massKg: 0.220
        },
        {
          width: 430,
          height: 932,
          dpr: 3,
          name: "iPhone Pro Max系",
          massKg: 0.225
        }
      ];

      const match = iPhoneRules.find((rule) => {
        return (
          Math.abs(rule.width - width) <= 2 &&
          Math.abs(rule.height - height) <= 2 &&
          Math.abs(rule.dpr - dpr) <= 0.1
        );
      });

      if (match) {
        return {
          name: match.name,
          massKg: match.massKg,
          confidence: "screen"
        };
      }

      return {
        name: "iPhone 推定",
        massKg: 0.190,
        confidence: "fallback"
      };
    }

    async function estimateDeviceMass() {
      const manualMass = getManualMassFromUrl();
      if (manualMass) return manualMass;

      const ua = navigator.userAgent || "";
      const platform = navigator.platform || "";
      const isIPhone = /iPhone/.test(ua);
      const isIPad =
        /iPad/.test(ua) ||
        (platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/.test(ua);

      if (isIPhone) {
        return estimateIPhoneMass();
      }

      if (isIPad) {
        return {
          name: "iPad 推定",
          massKg: 0.500,
          confidence: "fallback"
        };
      }

      if (isAndroid) {
        const modelName = await getAndroidModelName();

        // Android は機種名が取れる場合がありますが、
        // 重量表がない機種では標準値 200g を使います。
        return {
          name: modelName ? modelName : "Android 推定",
          massKg: 0.200,
          confidence: modelName ? "model-name-only" : "fallback"
        };
      }

      return {
        name: "標準端末",
        massKg: 0.200,
        confidence: "default"
      };
    }

    async function applyEstimatedDeviceMass() {
      deviceEstimate = await estimateDeviceMass();
      phoneMassKg = deviceEstimate.massKg;

      // 画面には出さず、確認用にコンソールへ出します。
      console.log(
        `推定端末: ${deviceEstimate.name}, 重量: ${(phoneMassKg * 1000).toFixed(0)}g, confidence: ${deviceEstimate.confidence}`
      );
    }

    function getDynamicAcceleration(event) {
      const a = event.acceleration;

      if (a && a.x !== null && a.y !== null && a.z !== null) {
        const x = a.x || 0;
        const y = a.y || 0;
        const z = a.z || 0;
        return Math.sqrt(x * x + y * y + z * z);
      }

      const g = event.accelerationIncludingGravity;

      if (g && g.x !== null && g.y !== null && g.z !== null) {
        const x = g.x || 0;
        const y = g.y || 0;
        const z = g.z || 0;
        const magnitude = Math.sqrt(x * x + y * y + z * z);
        return Math.abs(magnitude - 9.80665);
      }

      return 0;
    }

    function showWaiting() {
      mainText.textContent = "スマホを振ってください";
    }

    function showResult(forceN) {
      mainText.innerHTML = `この一振り<br><span class="value">${forceN.toFixed(2)}N</span>`;
    }

    function handleMotion(event) {
      const now = performance.now();
      const dynamicA = getDynamicAcceleration(event);

      if (!isMeasuring) {
        if (now - lastResultTime < 700) return;

        if (dynamicA > startThreshold) {
          isMeasuring = true;
          peakAcceleration = dynamicA;
          quietStartTime = null;
        }

        return;
      }

      peakAcceleration = Math.max(peakAcceleration, dynamicA);

      if (dynamicA < endThreshold) {
        if (quietStartTime === null) {
          quietStartTime = now;
        }

        if (now - quietStartTime > 350) {
          isMeasuring = false;
          lastResultTime = now;

          const forceN = phoneMassKg * peakAcceleration;
          showResult(forceN);
        }
      } else {
        quietStartTime = null;
      }
    }

    async function startMeasurement() {
      try {
        await applyEstimatedDeviceMass();

        if (
          typeof DeviceMotionEvent !== "undefined" &&
          typeof DeviceMotionEvent.requestPermission === "function"
        ) {
          const permission = await DeviceMotionEvent.requestPermission();

          if (permission !== "granted") {
            startButton.textContent = "許可が必要です";
            return;
          }
        }

        startButton.classList.add("hidden");
        mainText.classList.remove("hidden");
        showWaiting();

        window.addEventListener("devicemotion", handleMotion);

      } catch (error) {
        startButton.textContent = "計測できません";
      }
    }

    startButton.addEventListener("click", startMeasurement);
  </script>
</body>
</html>
